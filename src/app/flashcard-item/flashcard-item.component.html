<div class="flashcard-container" [class.flipped]="showAnswer" (click)="toggleAnswer()">
  <!-- Front of Card (Question) -->
  <div class="card-face card-front" [style.background]="cardGradient">
    <div class="card-content d-flex flex-column justify-content-between h-100">
      <div class="card-header-row d-flex justify-content-between align-items-center">
        <span class="badge badge-category">{{ question.category }}</span>
        <div class="metadata-icons">
          <i class="bi bi-bookmark"></i>
        </div>
      </div>

      <div class="question-text text-center">
        <h2>{{ question.question }}</h2>
      </div>

      <div class="card-footer-row text-center">
        @if (!isAlreadyRevealed()) {
          <div class="reveal-cost">
            <i class="bi bi-star-fill"></i> 1 Point to Reveal
          </div>
        } @else {
          <span class="tap-hint">Tap to flip</span>
        }
      </div>
    </div>
  </div>

  <!-- Back of Card (Answer) -->
  <div class="card-face card-back">
    <div class="card-content d-flex flex-column justify-content-between h-100">
      <div class="card-header-row d-flex justify-content-between align-items-center">
        <span class="badge badge-category-dark">{{ question.category }}</span>
        <div class="metadata-icons text-dark">
          <i class="bi bi-share"></i>
        </div>
      </div>

      <div class="answer-text">
        <p>{{ question.answer }}</p>
        @if (question.code) {
        <div class="code-block mt-3 text-start" (click)="$event.stopPropagation()">
          <pre class="language-java"><code class="language-java">{{ question.code }}</code></pre>
        </div>
        }
      </div>

      <div class="metadata-info d-flex justify-content-center flex-wrap gap-2 mt-3">
        @for (chip of metadataChips; track chip) {
        <span class="metadata-chip" [ngClass]="getChipClass(chip)">
          {{ chip }}
        </span>
        }
      </div>
    </div>
  </div>
</div>

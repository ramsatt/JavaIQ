<div class="app-container d-flex flex-column h-100">
  <!-- Header -->
  <header class="p-4">
    <div class="d-flex align-items-center">
      <button class="btn btn-icon-back me-3" (click)="goBack()">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div class="flex-grow-1">
        <div class="d-flex align-items-center">
          <h2 class="category-title m-0">{{ selectedCategory }}</h2>
          <div class="points-badge-pill ms-2">
            <i class="bi bi-star-fill"></i>
            <span>{{ dataService.points() }}</span>
          </div>
        </div>
        <p class="app-subtitle m-0">Practice Mode</p>
      </div>
    </div>
  </header>

  <!-- Main Card Area -->
  <main
    class="flex-grow-1 d-flex align-items-center justify-content-center position-relative p-3"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
  >
    <!-- Background Stacked Cards (Decorative) -->
    <div class="card-stack-1"></div>
    <div class="card-stack-2"></div>

    <!-- Active Card -->
    <div
      class="active-card-container w-100"
      style="max-width: 400px; z-index: 10; opacity: 1; transition: opacity 0.3s ease"
      [ngClass]="animationState"
    >
      <app-flashcard-item
        [question]="filteredQuestions[currentQuestionIndex]"
        (answerShown)="onAnswerShown()"
      >
      </app-flashcard-item>
    </div>
  </main>

  <!-- Footer / Controls -->
  <footer class="p-4 d-flex justify-content-between align-items-center">
    <button class="btn btn-icon" (click)="prevQuestion()" [disabled]="currentQuestionIndex === 0">
      <i class="bi bi-arrow-left"></i> Prev
    </button>

    <div class="progress-indicator">
      <span class="current">{{ currentQuestionIndex + 1 }}</span>
      <span class="divider">/</span>
      <span class="total">{{ filteredQuestions.length }}</span>
    </div>

    <button
      class="btn btn-icon"
      (click)="nextQuestion()"
      [disabled]="currentQuestionIndex === filteredQuestions.length - 1"
    >
      Next <i class="bi bi-arrow-right"></i>
    </button>
  </footer>
</div>

<app-quiz-modal [allQuestions]="allQuestions" [category]="selectedCategory" (quizFinished)="onQuizFinished()"></app-quiz-modal>
